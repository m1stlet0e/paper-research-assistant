<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI论文全自动预研助手 - 智能文献综述系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --warning-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
            --hover-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        body {
            font-family: 'Noto Sans SC', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 0;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header h1 .emoji {
            font-size: 1.2em;
        }

        .header p {
            font-size: 1.3em;
            opacity: 0.95;
            font-weight: 300;
        }

        .header .tagline {
            margin-top: 15px;
            font-size: 1em;
            opacity: 0.85;
            padding: 8px 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: inline-block;
        }

        /* Search Box */
        .search-box {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 35px;
        }

        .search-box .search-title {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 300px;
            padding: 18px 25px;
            font-size: 16px;
            border: 3px solid #e8e8e8;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-box button {
            padding: 18px 40px;
            font-size: 16px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .search-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .search-box .button-group {
            display: flex;
            gap: 10px;
        }

        .search-box .btn-feishu {
            background: linear-gradient(135deg, #3370ff 0%, #85a5ff 100%);
        }

        .search-box .btn-feishu:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(51, 112, 255, 0.4);
        }

        .search-box .btn-export {
            background: linear-gradient(135deg, #52c41a 0%, #95de64 100%);
        }

        .search-box .btn-export:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(82, 196, 26, 0.4);
        }

        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Quick Tags */
        .quick-tags {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .quick-tags span {
            color: #666;
            font-size: 0.9em;
        }

        .quick-tag {
            padding: 8px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            color: #555;
            font-family: inherit;
        }

        .quick-tag:hover {
            background: #667eea;
            color: white;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--primary-gradient);
        }

        .stat-card:nth-child(2)::before {
            background: var(--secondary-gradient);
        }

        .stat-card:nth-child(3)::before {
            background: var(--success-gradient);
        }

        .stat-card:nth-child(4)::before {
            background: var(--warning-gradient);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
        }

        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .stat-card h3 {
            font-size: 2.8em;
            color: #667eea;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .stat-card p {
            color: #666;
            font-size: 1.1em;
            font-weight: 400;
        }

        /* Charts */
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 35px;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .chart-container h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chart-container h2 .icon {
            font-size: 1.3em;
        }

        /* Papers List */
        .papers-section {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 35px;
        }

        .papers-section h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .paper-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e8e8e8;
            transition: all 0.3s;
            position: relative;
        }

        .paper-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
            border-color: #667eea;
        }

        .paper-card .number {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: var(--primary-gradient);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }

        .paper-card .title {
            font-size: 1.15em;
            color: #333;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.4;
            padding-right: 40px;
        }

        .paper-card .authors {
            color: #666;
            margin-bottom: 12px;
            font-size: 0.95em;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .paper-card .author-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .paper-card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 15px;
        }

        .paper-card .meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .paper-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .paper-card .tag {
            background: linear-gradient(135deg, #e8eeff 0%, #f0e8ff 100%);
            color: #667eea;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .paper-card .actions {
            display: flex;
            gap: 10px;
        }

        .paper-card .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .paper-card .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .paper-card .btn-primary:hover {
            transform: scale(1.02);
        }

        .paper-card .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .paper-card .btn-secondary:hover {
            background: #eee;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.3em;
        }

        .loading .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            background: #fee;
            color: #c00;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .charts {
                grid-template-columns: 1fr;
            }

            .search-input-group {
                flex-direction: column;
            }

            .search-box input {
                min-width: 100%;
            }

            .papers-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="emoji">📚</span> AI论文全自动预研助手</h1>
            <p>基于多Agent协作的智能文献综述系统</p>
            <div class="tagline">🚀 一键生成学术研究综述报告</div>
        </div>

        <div class="search-box">
            <div class="search-title">
                <span class="icon">🔍</span> 开始研究
            </div>
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="输入研究课题，例如：machine learning, deep learning, speech recognition..." />
                <div class="button-group">
                    <button onclick="searchPapers()" id="searchBtn">
                        <span>🚀</span> 开始检索
                    </button>
                    <button onclick="sendToFeishu()" id="feishuBtn" class="btn-feishu" style="display: none;">
                        <span>💬</span> 发送到飞书
                    </button>
                    <button onclick="exportReport()" id="exportBtn" class="btn-export" style="display: none;">
                        <span>📥</span> 导出报告
                    </button>
                </div>
            </div>
            <div class="quick-tags">
                <span>快速搜索：</span>
                <button class="quick-tag" onclick="quickSearch('neural network')">神经网络</button>
                <button class="quick-tag" onclick="quickSearch('deep learning')">深度学习</button>
                <button class="quick-tag" onclick="quickSearch('transformer')">Transformer</button>
                <button class="quick-tag" onclick="quickSearch('speech recognition')">语音识别</button>
                <button class="quick-tag" onclick="quickSearch('computer vision')">计算机视觉</button>
                <button class="quick-tag" onclick="quickSearch('natural language processing')">NLP</button>
            </div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="icon">📄</div>
                <h3 id="totalPapers">0</h3>
                <p>找到论文 (篇)</p>
            </div>
            <div class="stat-card">
                <div class="icon">👥</div>
                <h3 id="uniqueAuthors">0</h3>
                <p>独特作者 (位)</p>
            </div>
            <div class="stat-card">
                <div class="icon">🏷️</div>
                <h3 id="uniqueCategories">0</h3>
                <p>研究领域 (个)</p>
            </div>
            <div class="stat-card">
                <div class="icon">⏱️</div>
                <h3 id="searchTime">0s</h3>
                <p>检索耗时</p>
            </div>
        </div>

        <div class="charts" id="charts" style="display: none;">
            <div class="chart-container">
                <h2><span class="icon">📈</span> 论文发表趋势</h2>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-container">
                <h2><span class="icon">🏷️</span> 研究领域分布</h2>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="papers-section" id="papersSection" style="display: none;">
            <h2><span class="icon">📚</span> 论文列表</h2>
            <div class="papers-grid" id="papersGrid"></div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <div>正在检索论文，请稍候...</div>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;">
            <span id="errorText">搜索失败，请稍后重试</span>
        </div>
    </div>

    <script>
        let trendChart = null;
        let categoryChart = null;
        let currentQuery = '';
        let currentPapers = [];
        let currentStats = {};

        // Quick search function
        function quickSearch(query) {
            document.getElementById('searchInput').value = query;
            searchPapers();
        }

        // Check if backend is available
        async function checkBackend() {
            try {
                const response = await fetch('http://localhost:5002/api/health', {
                    method: 'GET',
                    signal: AbortSignal.timeout(2000)
                });
                return response.ok;
            } catch {
                return false;
            }
        }

        async function searchPapers() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showError('请输入搜索关键词');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('charts').style.display = 'none';
            document.getElementById('papersSection').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';

            const startTime = Date.now();

            try {
                // Try backend API first
                const backendAvailable = await checkBackend();
                
                if (backendAvailable) {
                    // Use backend API
                    const response = await fetch('http://localhost:5002/api/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: query, max_results: 50 })
                    });
                    
                    if (!response.ok) throw new Error('API请求失败');
                    
                    const data = await response.json();
                    displayResults(data.papers, startTime);
                } else {
                    // Fallback: Use direct arXiv API with proper encoding
                    throw new Error('后端服务未启动');
                }

            } catch (error) {
                console.error('搜索失败:', error);
                
                // Try direct arXiv API as final fallback
                try {
                    const encodedQuery = encodeURIComponent(query);
                    const response = await fetch(
                        `https://export.arxiv.org/api/query?search_query=all:${encodedQuery}&start=0&max_results=50&sortBy=submittedDate&sortOrder=descending`
                    );
                    
                    if (!response.ok) throw new Error('API请求失败');
                    
                    const text = await response.text();
                    const papers = parseArxivXML(text);
                    displayResults(papers, startTime);
                } catch (e) {
                    showError(`搜索失败: ${e.message}。请稍后重试或启动后端服务。`);
                }
            }
        }

        function parseArxivXML(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            const entries = xmlDoc.querySelectorAll('entry');
            
            const papers = [];
            
            entries.forEach(entryEl => {
                const title = entryEl.querySelector('title')?.textContent?.replace(/\n/g, ' ').trim() || '';
                const summary = entryEl.querySelector('summary')?.textContent?.replace(/\n/g, ' ').trim() || '';
                const published = entryEl.querySelector('published')?.textContent || '';
                
                const authors = [];
                entryEl.querySelectorAll('author name').forEach(nameEl => {
                    authors.push({ name: nameEl.textContent });
                });
                
                const categories = [];
                entryEl.querySelectorAll('category').forEach(catEl => {
                    categories.push(catEl.getAttribute('term'));
                });
                
                const links = entryEl.querySelectorAll('link');
                let pdfUrl = '';
                let arxivId = '';
                
                links.forEach(link => {
                    if (link.getAttribute('type') === 'application/pdf') {
                        pdfUrl = link.getAttribute('href');
                    }
                });
                
                const idEl = entryEl.querySelector('id');
                if (idEl) {
                    arxivId = idEl.textContent.split('/').pop();
                }
                
                papers.push({
                    title,
                    authors,
                    summary,
                    published,
                    categories,
                    pdf_url: pdfUrl,
                    arxiv_id: arxivId
                });
            });
            
            return papers;
        }

        function displayResults(papers, startTime) {
            const endTime = Date.now();
            const searchTime = (endTime - startTime) / 1000;
            
            // 保存当前搜索数据
            currentQuery = document.getElementById('searchInput').value.trim();
            currentPapers = papers;
            currentStats = {
                total: papers.length,
                authors: document.getElementById('uniqueAuthors').textContent,
                categories: document.getElementById('uniqueCategories').textContent,
                years: {}
            };
            
            // 显示发送到飞书按钮
            document.getElementById('feishuBtn').style.display = 'inline-flex';
            document.getElementById('feishuBtn').innerHTML = '<span>💬</span> 发送到飞书';
            document.getElementById('feishuBtn').disabled = false;
            
            // 显示导出报告按钮
            document.getElementById('exportBtn').style.display = 'inline-flex';
            document.getElementById('exportBtn').innerHTML = '<span>📥</span> 导出报告';
            document.getElementById('exportBtn').disabled = false;
            
            // Hide loading
            document.getElementById('loading').style.display = 'none';
            
            if (!papers || papers.length === 0) {
                showError('未找到相关论文，请尝试其他关键词');
                return;
            }
            
            // Display stats
            document.getElementById('totalPapers').textContent = papers.length;
            document.getElementById('searchTime').textContent = searchTime.toFixed(2) + 's';
            
            // Calculate unique authors and categories
            const authors = new Set();
            const categories = new Set();
            
            papers.forEach(paper => {
                paper.authors?.forEach(author => authors.add(author.name));
                paper.categories?.forEach(cat => categories.add(cat));
            });
            
            document.getElementById('uniqueAuthors').textContent = authors.size;
            document.getElementById('uniqueCategories').textContent = categories.size;
            
            document.getElementById('stats').style.display = 'grid';
            
            // Display papers
            displayPapers(papers);
            
            // Generate charts
            generateCharts(papers, categories);
            
            // Show results
            document.getElementById('charts').style.display = 'grid';
            document.getElementById('papersSection').style.display = 'block';
        }

        function displayPapers(papers) {
            const grid = document.getElementById('papersGrid');
            grid.innerHTML = '';
            
            papers.forEach((paper, index) => {
                const card = document.createElement('div');
                card.className = 'paper-card';
                
                const authorsStr = paper.authors?.slice(0, 3).map(a => a.name).join(', ') || '未知';
                const moreAuthors = paper.authors?.length > 3 ? ` 等${paper.authors.length}位` : '';
                const categoriesStr = paper.categories?.slice(0, 3).join(', ') || '无';
                const date = paper.published ? new Date(paper.published).toLocaleDateString('zh-CN') : '未知';
                
                card.innerHTML = `
                    <div class="number">${index + 1}</div>
                    <div class="title">${paper.title}</div>
                    <div class="authors">
                        ${paper.authors?.slice(0, 3).map(a => `<span class="author-tag">${a.name}</span>`).join('')}
                        ${moreAuthors ? `<span class="author-tag">${moreAuthors}</span>` : ''}
                    </div>
                    <div class="meta">
                        <span>📅 ${date}</span>
                        <span>📊 ${paper.categories?.length || 0}个分类</span>
                    </div>
                    <div class="tags">
                        ${(paper.categories || []).slice(0, 3).map(cat => `<span class="tag">${cat}</span>`).join('')}
                    </div>
                    <div class="actions">
                        <a href="${paper.pdf_url}" target="_blank" class="btn btn-primary">📥 PDF下载</a>
                        <a href="https://arxiv.org/abs/${paper.arxiv_id}" target="_blank" class="btn btn-secondary">🔗 arXiv</a>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function generateCharts(papers, categories) {
            // Destroy old charts
            if (trendChart) trendChart.destroy();
            if (categoryChart) categoryChart.destroy();
            
            // Trend chart - 按年份分组统计论文数量
            const yearCounts = {};
            papers.forEach(p => {
                const year = new Date(p.published).getFullYear();
                yearCounts[year] = (yearCounts[year] || 0) + 1;
            });
            
            // 按年份排序
            const sortedYears = Object.keys(yearCounts).sort();
            const trendLabels = sortedYears;
            const trendData = sortedYears.map(y => yearCounts[y]);
            
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: trendLabels,
                    datasets: [{
                        label: '论文序号',
                        data: trendData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: '论文数量' }
                        },
                        x: {
                            title: { display: true, text: '年份' }
                        }
                    }
                }
            });
            
            // Category chart
            const categoryCounts = {};
            papers.forEach(paper => {
                (paper.categories || []).forEach(cat => {
                    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
                });
            });
            
            const sortedCategories = Object.entries(categoryCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 12);
            
            const colors = [
                '#667eea', '#764ba2', '#f093fb', '#f5576c',
                '#4facfe', '#00f2fe', '#fa709a', '#fee140',
                '#a8edea', '#fed6e3', '#d299c2', '#fde4cf'
            ];
            
            const categoryCtx = document.getElementById('categoryChart').getContext('2d');
            categoryChart = new Chart(categoryCtx, {
                type: 'bar',
                data: {
                    labels: sortedCategories.map(item => item[0]),
                    datasets: [{
                        label: '论文数量',
                        data: sortedCategories.map(item => item[1]),
                        backgroundColor: colors.slice(0, sortedCategories.length),
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            title: { display: true, text: '论文数量' }
                        }
                    }
                }
            });
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
        }

        // 发送到飞书消息卡片
        async function sendToFeishu() {
            if (!currentQuery || currentPapers.length === 0) {
                alert('请先搜索课题');
                return;
            }

            const btn = document.getElementById('feishuBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> 发送中...';

            try {
                const response = await fetch('http://localhost:5002/api/send_card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: currentQuery,
                        papers: currentPapers,
                        stats: currentStats
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('✅ 消息卡片已发送到飞书！');
                    btn.innerHTML = '<span>✅</span> 已发送';
                } else {
                    alert('发送失败: ' + data.error);
                    btn.disabled = false;
                    btn.innerHTML = '<span>💬</span> 发送到飞书';
                }
            } catch (error) {
                alert('发送失败: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<span>💬</span> 发送到飞书';
            }
        }

        // 导出报告功能
        function exportReport() {
            if (!currentQuery || currentPapers.length === 0) {
                alert('请先搜索课题');
                return;
            }

            const btn = document.getElementById('exportBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> 生成中...';

            // 生成Markdown报告
            let report = `# 📚 ${currentQuery} - 研究报告\n\n`;
            report += `**生成时间**: ${new Date().toLocaleString('zh-CN')}\n\n`;
            report += `---\n\n`;
            report += `## 📊 统计概览\n\n`;
            report += `- **论文总数**: ${currentPapers.length}\n`;
            report += `- **独特作者**: ${document.getElementById('uniqueAuthors').textContent}\n`;
            report += `- **研究领域**: ${document.getElementById('uniqueCategories').textContent}\n\n`;
            report += `---\n\n`;
            report += `## 📄 论文列表\n\n`;

            currentPapers.forEach((p, i) => {
                report += `### ${i + 1}. ${p.title}\n\n`;
                report += `- **作者**: ${p.authors.map(a => a.name).join(', ')}\n`;
                report += `- **arXiv**: ${p.arxiv_id}\n`;
                report += `- **发表日期**: ${p.published ? p.published.substring(0, 10) : 'N/A'}\n`;
                report += `- **分类**: ${p.categories.join(', ')}\n`;
                report += `- **PDF**: ${p.pdf_url}\n\n`;
            });

            report += `---\n\n`;
            report += `*由 AI论文预研助手 自动生成*\n`;

            // 下载文件
            const blob = new Blob([report], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${currentQuery.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            btn.innerHTML = '<span>✅</span> 已导出';
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = '<span>📥</span> 导出报告';
            }, 2000);
        }

        // Initialize - clear all data on page load
        window.onload = function() {
            // Reset search input
            document.getElementById('searchInput').value = '';
            
            // Reset stats to zero
            document.getElementById('totalPapers').textContent = '0';
            document.getElementById('uniqueAuthors').textContent = '0';
            document.getElementById('uniqueCategories').textContent = '0';
            document.getElementById('searchTime').textContent = '0s';
            
            // Hide all result sections
            document.getElementById('stats').style.display = 'none';
            document.getElementById('charts').style.display = 'none';
            document.getElementById('papersSection').style.display = 'none';
            
            // Clear charts if they exist
            if (typeof trendChart !== 'undefined' && trendChart) { 
                trendChart.destroy(); 
                trendChart = null; 
            }
            if (typeof categoryChart !== 'undefined' && categoryChart) { 
                categoryChart.destroy(); 
                categoryChart = null; 
            }
            
            // Clear papers grid
            document.getElementById('papersGrid').innerHTML = '';
        };

        // Handle Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPapers();
            }
        });
    </script>
</body>
</html>
